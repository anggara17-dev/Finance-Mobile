<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CuanTracker - Anggara</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    .toast { animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    .loading-overlay { background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); z-index: 9999; }
    input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; }
  </style>
</head>
<body class="h-full overflow-hidden text-slate-800 bg-slate-50">

  <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-full max-w-xs hidden"></div>

  <div id="loader" class="fixed inset-0 hidden flex items-center justify-center loading-overlay">
    <div class="flex flex-col items-center gap-3">
      <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-green-800 border-r-transparent"></div>
      <p class="text-xs font-bold text-green-800 animate-pulse">Sinkronisasi Data...</p>
    </div>
  </div>

  <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-green-800">
    <div class="w-full max-w-sm text-center">
      <div class="bg-white/20 w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto mb-6 backdrop-blur-md">
        <i data-lucide="wallet" class="text-white w-10 h-10"></i>
      </div>
      <h1 class="text-3xl font-extrabold text-white mb-2 tracking-tight">CuanTracker</h1>
      <p class="text-green-200 text-sm opacity-80">Catat setiap rupiah dengan mudah</p>
      
      <div class="bg-white rounded-[2.5rem] p-8 shadow-2xl mt-8 text-left">
        <form id="login-form" class="space-y-4">
          <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Username</label>
            <input id="login-name" type="text" placeholder="Masukkan namamu..." class="w-full bg-slate-100 rounded-2xl px-5 py-4 mt-2 outline-none focus:ring-2 focus:ring-green-600 transition-all font-semibold" required>
          </div>
          <button type="submit" class="w-full py-4 rounded-2xl bg-green-800 text-white font-bold shadow-lg shadow-green-900/20 active:scale-95 transition-all">Masuk Sekarang</button>
        </form>
      </div>
    </div>
  </div>

  <div id="main-app" class="hidden h-full flex flex-col">
    <header class="bg-green-800 text-white px-6 pt-8 pb-10 rounded-b-[3rem] shadow-xl relative z-10">
      <div class="max-w-2xl mx-auto flex justify-between items-center">
        <div>
          <p id="user-display" class="text-xs text-green-300 font-medium"></p>
          <h2 class="text-xl font-bold tracking-tight">Dashboard Keuangan</h2>
        </div>
        <button onclick="refreshData()" class="p-3 bg-white/10 rounded-2xl hover:bg-white/20 active:rotate-180 transition-all duration-500">
          <i data-lucide="refresh-cw" class="w-5 h-5"></i>
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto px-4 -mt-6 pb-20 relative z-20">
      <div class="max-w-2xl mx-auto space-y-6">
        
        <div class="bg-white rounded-[2.5rem] p-7 shadow-xl border border-slate-100">
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">Saldo Tersedia</p>
          <h2 id="dash-balance" class="text-3xl font-black text-slate-900 tracking-tight">Rp 0</h2>
          
          <div class="grid grid-cols-2 gap-4 mt-8">
            <div class="bg-green-50 p-4 rounded-2xl border border-green-100">
              <div class="flex items-center gap-2 mb-1">
                <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                <p class="text-[9px] font-bold uppercase tracking-tighter text-green-600">Masuk</p>
              </div>
              <p id="dash-inc" class="font-bold text-green-800 text-sm">Rp 0</p>
            </div>
            <div class="bg-red-50 p-4 rounded-2xl border border-red-100">
              <div class="flex items-center gap-2 mb-1">
                <div class="w-1.5 h-1.5 rounded-full bg-red-400"></div>
                <p class="text-[9px] font-bold uppercase tracking-tighter text-red-400">Keluar</p>
              </div>
              <p id="dash-exp" class="font-bold text-red-600 text-sm">Rp 0</p>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-[2.5rem] p-7 shadow-lg border border-slate-50">
          <div class="flex p-1.5 bg-slate-100 rounded-2xl mb-6">
            <button type="button" id="type-inc" class="flex-1 py-3 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-green-800">Pemasukan</button>
            <button type="button" id="type-exp" class="flex-1 py-3 rounded-xl text-xs font-bold transition-all text-slate-500">Pengeluaran</button>
          </div>
          
          <form id="tx-form" class="space-y-5">
            <div class="space-y-2">
              <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Apa kegiatannya?</label>
              <input id="inp-desc" type="text" placeholder="Contoh: Makan Siang" class="w-full bg-slate-50 rounded-2xl px-5 py-4 outline-none border-0 focus:ring-2 focus:ring-green-600 transition-all font-medium" required>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
              <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Nominal</label>
                <input id="inp-amt" type="number" placeholder="Jumlah" class="w-full bg-slate-50 rounded-2xl px-5 py-4 outline-none border-0 font-bold focus:ring-2 focus:ring-green-600" required>
              </div>
              <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Kategori</label>
                <select id="inp-cat" class="w-full bg-slate-50 rounded-2xl px-4 py-4 outline-none border-0 focus:ring-2 focus:ring-green-600 appearance-none font-medium">
                  <option value="Makanan">🍚 Makanan</option>
                  <option value="Gaji">💰 Gaji</option>
                  <option value="Transportasi">🚌 Transport</option>
                  <option value="Belanja">🛒 Belanja</option>
                  <option value="Tagihan">💡 Tagihan</option>
                  <option value="Lainnya">📌 Lainnya</option>
                </select>
              </div>
            </div>
            
            <div class="space-y-2">
              <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Tanggal</label>
              <input id="inp-date" type="date" class="w-full bg-slate-50 rounded-2xl px-5 py-4 border-0 outline-none focus:ring-2 focus:ring-green-600 font-medium">
            </div>
            
            <button type="submit" id="btn-save" class="w-full py-5 rounded-[1.5rem] bg-green-800 text-white font-bold active:scale-[0.98] transition-all shadow-lg shadow-green-900/20">Simpan Transaksi</button>
          </form>
        </div>

        <div class="space-y-4 pb-10">
          <div class="flex justify-between items-center px-4">
            <h3 class="font-bold text-slate-800 text-lg">Aktivitas</h3>
            <input id="filter-month" type="month" class="text-xs font-bold bg-white px-4 py-2 rounded-xl border-0 shadow-sm outline-none text-green-800">
          </div>
          
          <div id="tx-list" class="space-y-3"></div>
          
          <div id="empty-msg" class="hidden text-center py-16 opacity-30">
            <i data-lucide="layers" class="w-12 h-12 mx-auto mb-3"></i>
            <p class="font-bold">Belum ada transaksi</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    /** * KONFIGURASI: Ganti URL ini dengan URL Apps Script kamu 
     * Contoh: https://script.google.com/macros/s/XXXXX/exec
     */
    const API_URL = "https://script.google.com/macros/s/AKfycbz1jytLqA8D0wue8IUAUkirv-8A_8FfB08QtJThE7H5DN6nl22JTayXlPzRRbCc4uzfRQ/exec"; 

    let allData = [];
    let currentType = 'income';
    let currentUser = '';
    let currentMonth = new Date().toISOString().slice(0, 7);

    // Setup Awal
    document.getElementById('filter-month').value = currentMonth;
    document.getElementById('inp-date').value = new Date().toISOString().slice(0, 10);

    // Login logic
    document.getElementById('login-form').onsubmit = (e) => {
      e.preventDefault();
      const name = document.getElementById('login-name').value.trim();
      if (!name) return;
      
      currentUser = name;
      document.getElementById('user-display').textContent = `Halo, ${currentUser}! 👋`;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-app').classList.remove('hidden');
      refreshData();
    };

    // Toggle Pemasukan/Pengeluaran
    const btnInc = document.getElementById('type-inc');
    const btnExp = document.getElementById('type-exp');
    
    btnInc.onclick = () => setType('income');
    btnExp.onclick = () => setType('expense');

    function setType(type) {
      currentType = type;
      if (type === 'income') {
        btnInc.className = "flex-1 py-3 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-green-800";
        btnExp.className = "flex-1 py-3 rounded-xl text-xs font-bold transition-all text-slate-400";
      } else {
        btnExp.className = "flex-1 py-3 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-red-600";
        btnInc.className = "flex-1 py-3 rounded-xl text-xs font-bold transition-all text-slate-400";
      }
    }

    // Ambil Data dari Google Sheets
    async function refreshData() {
      if (!API_URL || API_URL.includes("URL_APPS_SCRIPT")) {
         showToast("API URL belum diatur!", false);
         return;
      }
      
      showLoader(true);
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        allData = Array.isArray(data) ? data : [];
        updateUI();
      } catch (err) {
        showToast("Gagal mengambil data ⚠️", false);
        console.error(err);
      }
      showLoader(false);
    }

    // Simpan Data ke Google Sheets
    document.getElementById('tx-form').onsubmit = async (e) => {
      e.preventDefault();
      const saveBtn = document.getElementById('btn-save');
      saveBtn.disabled = true;
      showLoader(true);

      const payload = {
        description: document.getElementById('inp-desc').value,
        amount: Number(document.getElementById('inp-amt').value),
        type: currentType,
        category: document.getElementById('inp-cat').value,
        date: document.getElementById('inp-date').value,
        user: currentUser
      };

      try {
        // GAS POST Handler (mode: no-cors paling stabil untuk deployment sederhana)
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
        
        showToast("Berhasil Disimpan! ✅");
        e.target.reset();
        document.getElementById('inp-date').value = new Date().toISOString().slice(0, 10);
        
        // Jeda 2 detik sebelum refresh agar Google Sheets selesai memproses row baru
        setTimeout(refreshData, 2000); 
      } catch (err) {
        showToast("Error saat menyimpan ❌", false);
      }
      
      saveBtn.disabled = false;
      showLoader(false);
    };

    // Render Tampilan
    function updateUI() {
      const filtered = allData.filter(d => (d.date || '').startsWith(currentMonth));
      
      // Hitung Saldo
      const totalInc = filtered.filter(d => d.type === 'income').reduce((s,d) => s + Number(d.amount || 0), 0);
      const totalExp = filtered.filter(d => d.type === 'expense').reduce((s,d) => s + Number(d.amount || 0), 0);
      
      document.getElementById('dash-balance').textContent = `Rp ${ (totalInc - totalExp).toLocaleString('id-ID') }`;
      document.getElementById('dash-inc').textContent = `Rp ${ totalInc.toLocaleString('id-ID') }`;
      document.getElementById('dash-exp').textContent = `Rp ${ totalExp.toLocaleString('id-ID') }`;

      // Render List
      const listContainer = document.getElementById('tx-list');
      const emptyMsg = document.getElementById('empty-msg');
      listContainer.innerHTML = '';
      
      if (filtered.length === 0) {
        emptyMsg.classList.remove('hidden');
      } else {
        emptyMsg.classList.add('hidden');
        // Urutkan dari yang terbaru
        filtered.sort((a,b) => b.date.localeCompare(a.date)).forEach(item => {
          const card = document.createElement('div');
          const isIncome = item.type === 'income';
          card.className = "bg-white p-5 rounded-[1.8rem] flex items-center justify-between border border-slate-100 shadow-sm animate-in fade-in slide-in-from-bottom-2 duration-300";
          card.innerHTML = `
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-xl shadow-inner">${getEmoji(item.category)}</div>
              <div>
                <p class="text-sm font-bold text-slate-800">${item.description}</p>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${item.date} • ${item.category}</p>
              </div>
            </div>
            <p class="text-sm font-black ${isIncome ? 'text-green-700' : 'text-red-600'}">
              ${isIncome ? '+' : '-'}Rp ${ Number(item.amount).toLocaleString('id-ID') }
            </p>
          `;
          listContainer.appendChild(card);
        });
      }
      lucide.createIcons();
    }

    // Helper Functions
    function getEmoji(cat) {
      const emojis = { Gaji:'💰', Makanan:'🍚', Transportasi:'🚌', Belanja:'🛒', Tagihan:'💡' };
      return emojis[cat] || '📌';
    }

    function showToast(msg, isSuccess = true) {
      const toast = document.getElementById('toast');
      toast.innerHTML = `
        <div class="toast flex items-center justify-center gap-2 px-6 py-3.5 rounded-2xl shadow-2xl text-white font-bold text-sm ${isSuccess ? 'bg-green-900' : 'bg-red-600'}">
          <i data-lucide="${isSuccess ? 'check-circle' : 'alert-triangle'}" class="w-4 h-4"></i>
          ${msg}
        </div>`;
      toast.classList.remove('hidden');
      lucide.createIcons();
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function showLoader(isVisible) {
      const loader = document.getElementById('loader');
      if (isVisible) {
        loader.classList.remove('hidden');
      } else {
        loader.classList.add('hidden');
      }
    }

    document.getElementById('filter-month').onchange = (e) => {
      currentMonth = e.target.value;
      updateUI();
    };

    lucide.createIcons();
  </script>
</body>
</html>
