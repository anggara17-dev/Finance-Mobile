<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Finance Mobile - Dashboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    .custom-scroll::-webkit-scrollbar { width: 5px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
  </style>
</head>
<body class="h-full bg-[#f8fafc] text-slate-800">

  <div id="loader" class="fixed inset-0 hidden z-[100] flex items-center justify-center bg-white/70 backdrop-blur-sm">
    <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-green-800"></div>
  </div>
  <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[101] w-full max-w-xs hidden"></div>

  <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-green-800 text-white">
    <div class="w-full max-w-sm text-center">
      <h1 class="text-3xl font-black mb-8 italic">CuanTracker.</h1>
      <div class="bg-white rounded-[2.5rem] p-8 shadow-2xl text-slate-800">
        <form id="login-form" class="space-y-4">
          <input id="login-name" type="text" placeholder="Username" class="w-full bg-slate-100 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-green-600 font-bold" required>
          <button type="submit" class="w-full py-4 rounded-2xl bg-green-800 text-white font-bold shadow-lg shadow-green-900/20 active:scale-95 transition-all">Buka Dashboard</button>
        </form>
      </div>
    </div>
  </div>

  <div id="main-app" class="hidden h-screen flex flex-col md:flex-row overflow-hidden">
    
    <div class="flex-1 h-full overflow-y-auto custom-scroll p-4 md:p-8 space-y-8">
      <header class="flex justify-between items-center">
        <div>
          <h2 class="text-2xl font-black text-slate-900">Dashboard</h2>
          <p id="user-display" class="text-sm text-slate-400 font-medium"></p>
        </div>
        <button onclick="refreshData()" class="p-3 bg-white shadow-sm border rounded-2xl hover:bg-slate-50 transition-all">
          <i data-lucide="refresh-cw" class="w-5 h-5 text-slate-600"></i>
        </button>
      </header>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div class="bg-green-800 p-6 rounded-[2rem] text-white shadow-xl shadow-green-900/10">
          <p class="text-[10px] font-bold uppercase opacity-60 mb-1">Total Saldo</p>
          <h3 id="dash-balance" class="text-2xl font-black">Rp 0</h3>
        </div>
        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
          <p class="text-[10px] font-bold uppercase text-slate-400 mb-1">Pemasukan</p>
          <h3 id="dash-inc" class="text-2xl font-black text-green-700">Rp 0</h3>
        </div>
        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
          <p class="text-[10px] font-bold uppercase text-slate-400 mb-1">Pengeluaran</p>
          <h3 id="dash-exp" class="text-2xl font-black text-red-600">Rp 0</h3>
        </div>
      </div>

      <div class="space-y-4">
        <div class="flex justify-between items-center">
          <h3 class="font-bold text-lg">Riwayat Transaksi</h3>
          <input id="filter-month" type="month" class="bg-white px-4 py-2 border rounded-xl text-xs font-bold outline-none">
        </div>
        <div id="tx-list" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></div>
        <div id="empty-msg" class="hidden text-center py-20 opacity-20"><i data-lucide="folder-open" class="w-12 h-12 mx-auto"></i></div>
      </div>
    </div>

    <div class="w-full md:w-[400px] lg:w-[450px] bg-white border-l border-slate-100 p-6 md:p-8 flex flex-col shadow-[-10px_0_30px_rgba(0,0,0,0.02)]">
      <div class="mb-8">
        <h3 class="text-xl font-black tracking-tight">Catat Baru</h3>
        <p class="text-xs text-slate-400 mt-1">Masukkan transaksi harianmu di sini.</p>
      </div>

      <div class="flex p-1.5 bg-slate-100 rounded-2xl mb-8">
        <button type="button" id="type-inc" class="flex-1 py-3 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-green-800">Pemasukan</button>
        <button type="button" id="type-exp" class="flex-1 py-3 rounded-xl text-xs font-bold transition-all text-slate-500">Pengeluaran</button>
      </div>

      <form id="tx-form" class="space-y-6 flex-1">
        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Keterangan</label>
          <input id="inp-desc" type="text" placeholder="Beli apa?" class="w-full bg-slate-50 rounded-2xl px-5 py-4 outline-none border-0 focus:ring-2 focus:ring-green-600 transition-all font-semibold" required>
        </div>

        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Nominal (Rp)</label>
          <input id="inp-amt" type="number" placeholder="0" class="w-full bg-slate-50 rounded-2xl px-5 py-4 outline-none border-0 focus:ring-2 focus:ring-green-600 text-xl font-black" required>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Kategori</label>
            <select id="inp-cat" class="w-full bg-slate-50 rounded-2xl px-4 py-4 outline-none border-0 text-sm font-bold appearance-none">
              <option value="Makanan">🍚 Makanan</option>
              <option value="Gaji">💰 Gaji</option>
              <option value="Transportasi">🚌 Transport</option>
              <option value="Belanja">🛒 Belanja</option>
              <option value="Tagihan">💡 Tagihan</option>
              <option value="Lainnya">📌 Lainnya</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Tanggal</label>
            <input id="inp-date" type="date" class="w-full bg-slate-50 rounded-2xl px-4 py-4 outline-none border-0 text-sm font-bold">
          </div>
        </div>

        <button type="submit" id="btn-save" class="w-full py-5 rounded-[2rem] bg-green-800 text-white font-bold shadow-xl shadow-green-900/20 active:scale-95 transition-all mt-4">Simpan Transaksi</button>
      </form>
      
      <p class="text-center text-[10px] text-slate-300 font-bold uppercase tracking-widest mt-8">CuanTracker v2.0</p>
    </div>
  </div>

  <script>
    // --- GANTI DENGAN URL APPS SCRIPT KAMU ---
    const API_URL = "URL_APPS_SCRIPT_KAMU"; 

    let allData = [];
    let currentType = 'income';
    let currentUser = '';
    let currentMonth = new Date().toISOString().slice(0, 7);

    document.getElementById('filter-month').value = currentMonth;
    document.getElementById('inp-date').value = new Date().toISOString().slice(0, 10);

    // Login
    document.getElementById('login-form').onsubmit = (e) => {
      e.preventDefault();
      currentUser = document.getElementById('login-name').value;
      document.getElementById('user-display').textContent = `Welcome back, ${currentUser}`;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-app').classList.remove('hidden');
      refreshData();
    };

    // Toggle Type
    const tInc = document.getElementById('type-inc');
    const tExp = document.getElementById('type-exp');
    tInc.onclick = () => setType('income');
    tExp.onclick = () => setType('expense');

    function setType(t) {
      currentType = t;
      tInc.className = t === 'income' ? "flex-1 py-3 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-green-800" : "flex-1 py-3 rounded-xl text-xs font-bold transition-all text-slate-400";
      tExp.className = t === 'expense' ? "flex-1 py-3 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-red-600" : "flex-1 py-3 rounded-xl text-xs font-bold transition-all text-slate-400";
    }

    async function refreshData() {
      if (!API_URL.startsWith("http")) return;
      showLoader(true);
      try {
        const response = await fetch(API_URL);
        allData = await response.json();
        updateUI();
      } catch (e) { showToast("Gagal Sinkron ⚠️", false); }
      showLoader(false);
    }

    document.getElementById('tx-form').onsubmit = async (e) => {
      e.preventDefault();
      const saveBtn = document.getElementById('btn-save');
      saveBtn.disabled = true;
      showLoader(true);

      const payload = {
        description: document.getElementById('inp-desc').value,
        amount: Number(document.getElementById('inp-amt').value),
        type: currentType,
        category: document.getElementById('inp-cat').value,
        date: document.getElementById('inp-date').value,
        user: currentUser
      };

      try {
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        showToast("Tersimpan! ✅");
        e.target.reset();
        document.getElementById('inp-date').value = new Date().toISOString().slice(0, 10);
        setTimeout(refreshData, 2000);
      } catch (e) { showToast("Gagal simpan", false); }
      
      saveBtn.disabled = false;
      showLoader(false);
    };

    function updateUI() {
      const filtered = Array.isArray(allData) ? allData.filter(d => (d.date || '').startsWith(currentMonth)) : [];
      const inc = filtered.filter(d => d.type === 'income').reduce((s,d) => s + Number(d.amount || 0), 0);
      const exp = filtered.filter(d => d.type === 'expense').reduce((s,d) => s + Number(d.amount || 0), 0);
      
      document.getElementById('dash-balance').textContent = `Rp ${(inc - exp).toLocaleString('id-ID')}`;
      document.getElementById('dash-inc').textContent = `Rp ${inc.toLocaleString('id-ID')}`;
      document.getElementById('dash-exp').textContent = `Rp ${exp.toLocaleString('id-ID')}`;

      const list = document.getElementById('tx-list');
      const empty = document.getElementById('empty-msg');
      list.innerHTML = '';
      
      if (filtered.length === 0) {
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        filtered.sort((a,b) => b.date.localeCompare(a.date)).forEach(item => {
          const div = document.createElement('div');
          div.className = "bg-white p-5 rounded-[2rem] flex items-center justify-between border border-slate-50 shadow-sm hover:shadow-md transition-all";
          div.innerHTML = `
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-xl">${getEmoji(item.category)}</div>
              <div>
                <p class="text-sm font-bold text-slate-800">${item.description}</p>
                <p class="text-[10px] text-slate-400 font-bold uppercase">${item.date}</p>
              </div>
            </div>
            <p class="text-sm font-black ${item.type === 'income' ? 'text-green-700' : 'text-red-600'}">
              ${item.type === 'income' ? '+' : '-'} ${Number(item.amount).toLocaleString('id-ID')}
            </p>
          `;
          list.appendChild(div);
        });
      }
      lucide.createIcons();
    }

    function getEmoji(cat) {
      const m = { Gaji:'💰', Makanan:'🍚', Transportasi:'🚌', Belanja:'🛒', Tagihan:'💡' };
      return m[cat] || '📌';
    }

    function showToast(msg, ok = true) {
      const t = document.getElementById('toast');
      t.innerHTML = `<div class="px-6 py-3 rounded-2xl shadow-2xl text-white font-bold text-sm ${ok ? 'bg-green-800' : 'bg-red-500'} animate-bounce">${msg}</div>`;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    function showLoader(v) { document.getElementById('loader').classList.toggle('hidden', !v); }

    document.getElementById('filter-month').onchange = (e) => {
      currentMonth = e.target.value;
      updateUI();
    };

    lucide.createIcons();
  </script>
</body>
</html>
